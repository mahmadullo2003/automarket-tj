<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoMarket TJ | v1.9 Ultimate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --main-blue: #0061ff; --search-orange: #fd7e14; }
        body { background: #f4f7f6; padding-bottom: 80px; font-family: 'Segoe UI', sans-serif; }
        .navbar-custom { background: white; padding: 15px; border-bottom: 2px solid #eee; }
        .part-card { border: none; border-radius: 15px; background: white; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s; height: 100%; }
        .part-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .card-img { height: 180px; object-fit: cover; width: 100%; }
        .want-to-buy-card { border: 2px dashed var(--search-orange) !important; background: #fffaf5; }
        .auth-box { max-width: 400px; margin: 50px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #ddd; display: flex; justify-content: space-around; padding: 12px; z-index: 1000; }
        @media (min-width: 769px) { .bottom-nav { display: none; } }
        .nav-pills .nav-link.active { background-color: var(--main-blue); }
    </style>
</head>
<body>

<nav class="navbar-custom sticky-top d-flex justify-content-between align-items-center px-4">
    <a href="#" class="fw-bold text-primary fs-4 text-decoration-none">AutoMarketTJ <span class="badge bg-light text-muted" style="font-size: 10px;">v1.9</span></a>
    <div id="userSection"></div>
</nav>

<div class="container mt-4">
    <div id="authUI" class="auth-box d-none">
        <h4 class="fw-bold text-center mb-4">Хуш омадед</h4>
        <input type="text" id="authName" class="form-control mb-2" placeholder="Номи шумо">
        <input type="text" id="authPhone" class="form-control mb-2" placeholder="Рақами телефон (933099029)">
        <input type="password" id="authPass" class="form-control mb-3" placeholder="Парол (мин. 6 аломат)">
        <button class="btn btn-primary w-100 mb-2" onclick="handleAuth('login')">Ворид шудан</button>
        <button class="btn btn-outline-primary w-100" onclick="handleAuth('register')">Бақайдгирӣ</button>
    </div>

    <ul class="nav nav-pills nav-justified mb-4 shadow-sm bg-white rounded-pill p-1">
        <li class="nav-item">
            <button class="nav-link active rounded-pill" data-bs-toggle="pill" data-bs-target="#sell-list">🛒 Фурӯш</button>
        </li>
        <li class="nav-item">
            <button class="nav-link rounded-pill" data-bs-toggle="pill" data-bs-target="#buy-list">🔍 Меҷӯянд</button>
        </li>
    </ul>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="sell-list"><div id="productUI" class="row"></div></div>
        <div class="tab-pane fade" id="buy-list"><div id="requestUI" class="row"></div></div>
    </div>
</div>

<div class="bottom-nav shadow-lg">
    <a href="#" onclick="location.reload()" class="text-primary fs-4"><i class="bi bi-house-door-fill"></i></a>
    <button class="btn text-secondary fs-4 p-0" data-bs-toggle="modal" data-bs-target="#addModal"><i class="bi bi-plus-square"></i></button>
    <a href="#" onclick="showAuth()" class="text-secondary fs-4"><i class="bi bi-person"></i></a>
</div>

<div class="modal fade" id="addModal" tabindex="-1">
    <div class="modal-dialog modal-lg border-0">
        <div class="modal-content rounded-4 border-0">
            <div class="modal-header border-0">
                <h5 class="fw-bold">Эълони нав</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <select id="postType" class="form-select mb-3 border-primary">
                    <option value="sell">Мефурӯшам (Эълони оддӣ)</option>
                    <option value="buy">Меҷӯям (Эълони ҷустуҷӯ)</option>
                </select>
                <div class="row g-2">
                    <div class="col-6">
                        <select id="carBrand" class="form-select" onchange="updateModels()">
                            <option value="">Марка</option>
                            <option value="Toyota">Toyota</option>
                            <option value="BMW">BMW</option>
                            <option value="Mercedes">Mercedes</option>
                            <option value="Opel">Opel</option>
                        </select>
                    </div>
                    <div class="col-6"><select id="carModel" class="form-select"><option>Модел</option></select></div>
                    <div class="col-12"><input type="text" id="partName" class="form-control" placeholder="Номи қисм"></div>
                    <div class="col-6"><input type="number" id="partPrice" class="form-control" placeholder="Нарх"></div>
                    <div class="col-6"><input type="text" id="userPhoneInput" class="form-control" readonly placeholder="Рақами шумо"></div>
                    <div class="col-12"><textarea id="description" class="form-control" placeholder="Тавсифи қисм..."></textarea></div>
                    <div class="col-12"><input type="file" id="partImage" class="form-control"></div>
                </div>
                <button class="btn btn-primary w-100 mt-3 py-2 fw-bold" onclick="uploadProduct()">НАШР КАРДАН</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCOYjoU34k2CDWVZd7D4XvhXAwgFK_LxlE",
        authDomain: "automarkettj.firebaseapp.com",
        projectId: "automarkettj",
        storageBucket: "automarkettj.firebasestorage.app",
        messagingSenderId: "614498527268",
        appId: "1:614498527268:web:ff06a8f246df42ac1ad0b1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // АВТОРИЗАТСИЯ БО ТЕЛЕФОН (v1.7)
    window.handleAuth = async (type) => {
        const name = document.getElementById('authName').value;
        const phone = document.getElementById('authPhone').value.trim();
        const pass = document.getElementById('authPass').value;
        const email = `${phone}@auto.tj`;

        if(phone.length < 9 || pass.length < 6) return alert("Рақам ё парол (мин. 6 аломат) хатост!");

        try {
            if(type === 'register') {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                await updateProfile(res.user, { displayName: name });
            } else { 
                await signInWithEmailAndPassword(auth, email, pass); 
            }
            location.reload();
        } catch (e) { alert("Хатогӣ: " + e.message); }
    };

    window.showAuth = () => document.getElementById('authUI').classList.toggle('d-none');
    window.logout = () => signOut(auth).then(() => location.reload());

    onAuthStateChanged(auth, (user) => {
        const userSec = document.getElementById('userSection');
        if (user) {
            userSec.innerHTML = `<span class="me-2 small fw-bold">${user.displayName || user.email.split('@')[0]}</span><button class="btn btn-sm btn-outline-danger" onclick="logout()"><i class="bi bi-box-arrow-right"></i></button>`;
            document.getElementById('userPhoneInput').value = user.email.split('@')[0];
            document.getElementById('authUI').classList.add('d-none');
            loadProducts();
        } else {
            userSec.innerHTML = `<button class="btn btn-primary btn-sm" onclick="showAuth()">Ворид шудан</button>`;
        }
    });

    window.updateModels = () => {
        const brand = document.getElementById('carBrand').value;
        const modelSel = document.getElementById('carModel');
        const models = {
            'Toyota': ['Camry', 'Corolla', 'Rav4', 'Prado', 'Land Cruiser'],
            'BMW': ['X5', 'X6', 'E34', 'E39', 'E60', 'F10', 'M5'],
            'Mercedes': ['C-Class', 'E-Class', 'S-Class', 'Sprinter', 'G-Wagen'],
            'Opel': ['Astra', 'Zafira', 'Vectra', 'Corsa']
        };
        modelSel.innerHTML = '<option>Модел</option>';
        if(models[brand]) models[brand].forEach(m => modelSel.innerHTML += `<option value="${m}">${m}</option>`);
    };

    window.deletePost = async (id) => {
        if(confirm("Оё мехоҳед ин эълонро нест кунед?")) {
            try {
                await deleteDoc(doc(db, "posts", id));
                location.reload();
            } catch (e) { alert("Хатогӣ ҳангоми нест кардан"); }
        }
    };

    window.uploadProduct = async () => {
        if(!auth.currentUser) return alert("Аввал ворид шавед!");
        const type = document.getElementById('postType').value;
        const file = document.getElementById('partImage').files[0];
        const name = document.getElementById('partName').value;
        const brand = document.getElementById('carBrand').value;
        const model = document.getElementById('carModel').value;
        const price = document.getElementById('partPrice').value || "Мувофиқа";
        const phone = document.getElementById('userPhoneInput').value;

        if(!name) return alert("Номи қисмро нависед!");

        let url = "";
        if(file) {
            const sRef = ref(storage, `parts/${Date.now()}_${file.name}`);
            await uploadBytes(sRef, file);
            url = await getDownloadURL(sRef);
        }

        await addDoc(collection(db, "posts"), {
            type, name, brand, model, price, phone, image: url, owner: auth.currentUser.email, date: new Date()
        });
        location.reload();
    };

    async function loadProducts() {
        const q = query(collection(db, "posts"), orderBy("date", "desc"));
        const snap = await getDocs(q);
        const sellList = document.getElementById('productUI');
        const buyList = document.getElementById('requestUI');
        sellList.innerHTML = ""; buyList.innerHTML = "";

        snap.forEach(docSnap => {
            const data = docSnap.data();
            const id = docSnap.id;
            const isOwner = auth.currentUser && auth.currentUser.email === data.owner;
            const cardHtml = `
                <div class="col-6 col-md-4 col-lg-3 mb-4">
                    <div class="part-card card ${data.type === 'buy' ? 'want-to-buy-card' : ''}">
                        ${data.image ? `<img src="${data.image}" class="card-img">` : `<div class="bg-light text-center py-5"><i class="bi bi-search fs-1 text-muted"></i></div>`}
                        <div class="p-3">
                            <div class="d-flex justify-content-between align-items-start">
                                <h6 class="fw-bold mb-1">${data.name}</h6>
                                ${isOwner ? `<button onclick="deletePost('${id}')" class="btn btn-sm text-danger p-0 border-0 bg-transparent"><i class="bi bi-trash"></i></button>` : ''}
                            </div>
                            <p class="small text-muted mb-2">${data.brand} ${data.model}</p>
                            <div class="d-flex justify-content-between align-items-center mt-auto">
                                <span class="fw-bold text-primary">${data.price} TJS</span>
                                <a href="https://wa.me/${data.phone}" class="btn btn-sm btn-success rounded-circle"><i class="bi bi-whatsapp"></i></a>
                            </div>
                        </div>
                    </div>
                </div>`;
            if(data.type === 'sell') sellList.innerHTML += cardHtml;
            else buyList.innerHTML += cardHtml;
        });
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
